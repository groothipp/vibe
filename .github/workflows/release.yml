name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            libxdo-dev \
            rpm

      - name: Install JS dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          tauriScript: bunx tauri
          args: --target ${{ matrix.target }}

      - name: Build macOS installer (.pkg)
        if: runner.os == 'macOS'
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Vibe Editor.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: .app bundle not found"
            find src-tauri/target/${{ matrix.target }}/release/bundle -type d 2>/dev/null
            exit 1
          fi

          # Create staging area with the .app
          mkdir -p pkg-root/Applications
          cp -R "$APP_PATH" pkg-root/Applications/

          # Post-install script to clear quarantine
          mkdir -p pkg-scripts
          cat > pkg-scripts/postinstall << 'SCRIPT'
#!/bin/bash
xattr -cr "/Applications/Vibe Editor.app" 2>/dev/null || true
SCRIPT
          chmod +x pkg-scripts/postinstall

          # Build the .pkg
          pkgbuild \
            --root pkg-root \
            --scripts pkg-scripts \
            --identifier com.vibe.editor \
            --version "${GITHUB_REF_NAME#v}" \
            --install-location / \
            "vibe-editor-${{ matrix.label }}.pkg"

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp *.pkg dist/ 2>/dev/null || true

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          echo "=== Bundle output ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null || echo "No bundle directory found"
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm dist/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Write-Host "=== Bundle output ==="
          Get-ChildItem -Recurse src-tauri/target/${{ matrix.target }}/release/bundle -ErrorAction SilentlyContinue | Select-Object FullName
          Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi dist/ -ErrorAction SilentlyContinue
          Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-${{ matrix.label }}
          path: dist/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Vibe ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/vibe-macos-arm64/*.pkg
            artifacts/vibe-macos-x64/*.pkg
            artifacts/vibe-linux-x64/*.deb
            artifacts/vibe-linux-x64/*.rpm
            artifacts/vibe-linux-x64/*.AppImage
            artifacts/vibe-windows-x64/*.msi
            artifacts/vibe-windows-x64/*.exe
